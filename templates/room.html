<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/room.css') }}">
</head>
<body>
    <div id="app" x-data="roomApp()" class="room-container">
        <!-- Header -->
        <div class="room-header bg-gradient">
            <div>
                <h1>Room Chat</h1>
                <p>Connected as: <strong x-text="nickname"></strong></p>
            </div>
            <button class="btn btn-danger" @click="leaveRoom()">Leave Room</button>
        </div>

        <!-- Error Alert -->
        <div x-show="error" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
            <span x-text="error"></span>
            <button type="button" class="btn-close" @click="error = ''" aria-label="Close"></button>
        </div>

        <!-- Main Content -->
        <div class="room-content">
            <!-- Video Section -->
            <div class="video-section">
                <div class="video-grid">
                    <!-- Local Video -->
                    <div class="video-container local">
                        <video id="localVideo" autoplay muted playsinline class="video-element"></video>
                        <div class="video-label" x-text="nickname + ' (You)'"></div>
                        <button class="mic-button" :class="isMicOn ? 'on' : 'off'" @click="toggleMic()" :title="isMicOn ? 'Mute' : 'Unmute'">
                            <span x-text="isMicOn ? '🎤' : '🔇'"></span>
                        </button>
                    </div>

                    <!-- Remote Videos -->
                    <template x-for="(stream, userId) in remoteStreams" :key="userId">
                        <div class="video-container remote">
                            <video :id="'video-' + userId" autoplay playsinline class="video-element"></video>
                            <div class="video-label" x-text="getRemoteUserNickname(userId)"></div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Users Section -->
                <div class="users-section">
                    <h5>Users in Room (<span x-text="users.length"></span>)</h5>
                    <div class="users-list">
                        <template x-for="user in users" :key="user.userId">
                            <div class="user-item">
                                <span class="user-dot">●</span>
                                <span x-text="user.nickname"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Chat Section -->
                <div class="chat-section">
                    <h5>Chat</h5>
                    <div class="messages" id="messagesContainer">
                        <template x-for="(msg, idx) in messages" :key="idx">
                            <div class="message" :class="[msg.type, msg.isOwn ? 'own' : '']">
                                <template x-if="msg.type === 'chat'">
                                    <>
                                        <span class="nickname" x-text="msg.nickname + ':"></span>
                                        <span class="text" x-text="msg.text"></span>
                                    </>
                                </template>
                                <template x-if="msg.type === 'system'">
                                    <span class="system-text" x-text="msg.text"></span>
                                </template>
                            </div>
                        </template>
                    </div>
                    <form class="message-input-form" @submit="sendMessage($event)">
                        <input type="text" class="form-control message-input" x-model="newMessage" placeholder="Type a message..." />
                        <button type="submit" class="btn btn-primary">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/webrtc.js') }}"></script>
    <script src="{{ url_for('static', filename='js/room.js') }}"></script>
</body>
</html>
