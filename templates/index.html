<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Navbar -->
        <nav class="navbar navbar-dark bg-gradient">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">🎤 Voice Chat Rooms</span>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container mt-5" x-data="lobbyApp()">
            <!-- Error Alert -->
            <div x-show="error" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span x-text="error"></span>
                <button type="button" class="btn-close" @click="error = ''" aria-label="Close"></button>
            </div>

            <!-- Header -->
            <div class="text-center mb-5">
                <h1 class="display-4 mb-2">Join or Create a Room</h1>
                <p class="lead text-muted">Connect with others instantly - no login required</p>
            </div>

            <!-- Create Room Button -->
            <div class="text-center mb-5">
                <button class="btn btn-primary btn-lg" @click="showCreateModal = true">
                    ➕ Create New Room
                </button>
            </div>

            <!-- Rooms List -->
            <div class="mb-5">
                <h2 class="mb-4">Available Rooms (<span x-text="rooms.length"></span>)</h2>
                
                <div x-show="loading" class="text-center text-muted">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <div x-show="!loading && rooms.length === 0" class="alert alert-info">
                    No rooms available. Create one to get started!
                </div>

                <div class="row g-4" x-show="!loading && rooms.length > 0">
                    <template x-for="room in rooms" :key="room.id">
                        <div class="col-md-6 col-lg-4">
                            <div class="card room-card h-100 shadow-sm">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title" x-text="room.name"></h5>
                                    <p class="card-text text-muted mb-3">
                                        👥 <span x-text="room.userCount"></span> user<span x-show="room.userCount !== 1">s</span>
                                    </p>
                                    <button class="btn btn-secondary mt-auto" @click="selectRoom(room)">Join Room</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div class="modal" id="createModal" tabindex="-1" x-data="" x-show="lobbyApp().showCreateModal" style="display: none;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Room</h5>
                    <button type="button" class="btn-close" @click="showCreateModal = false"></button>
                </div>
                <div class="modal-body">
                    <form id="createRoomForm">
                        <div class="mb-3">
                            <label for="roomName" class="form-label">Room Name</label>
                            <input type="text" class="form-control" id="roomName" placeholder="Enter room name" required>
                        </div>
                        <div class="mb-3">
                            <label for="nickName" class="form-label">Your Nickname</label>
                            <input type="text" class="form-control" id="nickName" placeholder="Enter your nickname" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" @click="showCreateModal = false">Cancel</button>
                    <button type="button" class="btn btn-primary" @click="createRoom()">Create & Join</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Join Room Modal -->
    <div class="modal" id="joinModal" tabindex="-1" x-data="" x-show="lobbyApp().showJoinModal" style="display: none;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Join Room: <span x-text="selectedRoom?.name"></span></h5>
                    <button type="button" class="btn-close" @click="showJoinModal = false"></button>
                </div>
                <div class="modal-body">
                    <form id="joinRoomForm">
                        <div class="mb-3">
                            <label for="joinNickname" class="form-label">Your Nickname</label>
                            <input type="text" class="form-control" id="joinNickname" placeholder="Enter your nickname" required autofocus>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" @click="showJoinModal = false">Cancel</button>
                    <button type="button" class="btn btn-primary" @click="joinRoom()">Join Room</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="{{ url_for('static', filename='js/lobby.js') }}"></script>
</body>
</html>
